    <text x="58" y="60" font-family="Space Grotesk, sans-serif" font-size="76" font-weight="600" fill="#FFFFFF" letter-spacing="-2">
      Aura<tspan fill="#E8A33A">·</tspan>Gen
    </text>
  </g>
  <!-- Tagline -->
  <text x="96" y="380" font-family="Space Grotesk, sans-serif" font-size="44" font-weight="500" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="-1">
